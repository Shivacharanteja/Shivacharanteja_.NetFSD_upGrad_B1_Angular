<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Electronics | Premium Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <button class="navbar-toggler me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fw-bold" href="#">NEXTGEN</a>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#hero">Featured</a></li>
                    <li class="nav-item"><a class="nav-link" href="#products">Store</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav flex-column gap-3">
                <li><a href="#" class="nav-link text-white">Laptops</a></li>
                <li><a href="#" class="nav-link text-white">Smartphones</a></li>
                <li><a href="#" class="nav-link text-white">Accessories</a></li>
            </ul>
        </div>
    </div>

    <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://placehold.co/1200x400/212529/white?text=Summer+Sale+50%+Off" class="d-block w-100" alt="Sale">
                <div class="carousel-caption d-none d-md-block">
                    <h2 class="display-4 fw-bold">Upgrade Your Tech</h2>
                    <p>Exclusive deals on latest premium gadgets.</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="https://wallpapers.com/images/hd/aesthetic-gaming-setup-z59x77ju5nd1nvfh.jpg" class="d-block w-100" alt="Laptops">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="container py-5" id="products">
        <h3 class="text-center mb-4">Trending Products</h3>
        <div class="row g-4">
            <div class="col-12 col-md-4">
                <div class="card shadow-sm border-0">
                    <img src="https://www.androidauthority.com/wp-content/uploads/2024/08/Bose-QuietComfort-Ultra-headphones.jpg" class="card-img-top" alt="Product">
                    <div class="card-body">
                        <h5>Ultra Headphones</h5>
                        <p class="text-muted">$199.00</p>
                        <button class="btn btn-primary w-100">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section class="bg-primary text-white py-5">
        <div class="container text-center">
            <h4>Join our Newsletter</h4>
            <p>Get updates on new products and special offers.</p>
            <form class="row g-2 justify-content-center mt-3">
                <div class="col-auto">
                    <input type="email" class="form-control" placeholder="name@email.com" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-dark px-4">Subscribe</button>
                </div>
            </form>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
