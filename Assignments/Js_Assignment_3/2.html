<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        .error { color: red; font-size: 0.8em; display: block; }
        .success { color: green; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Registration Form</h2>
    <div class="form-group">
        <label>Name:</label><br>
        <input type="text" id="name" onchange="validateName()">
        <span id="nameError" class="error"></span>
    </div>
    <div class="form-group">
        <label>Email:</label><br>
        <input type="text" id="email" onchange="validateEmail()">
        <span id="emailError" class="error"></span>
    </div>
    <div class="form-group">
        <label>Age:</label><br>
        <input type="number" id="age" onchange="validateAge()">
        <span id="ageError" class="error"></span>
    </div>
    <button type="button" onclick="saveData()">Submit</button>
    <div id="finalMessage"></div>
    <script>
        function validateName() {
            const name = document.getElementById('name').value;
            const error = document.getElementById('nameError');
            if (name.trim() === "") {
                error.innerText = "Name cannot be empty";
                return false;
            }
            error.innerText = "";
            return true;
        }
        function validateEmail() {
            const email = document.getElementById('email').value;
            const error = document.getElementById('emailError');
            if (!email.includes("@")) {
                error.innerText = "Email must contain '@'";
                return false;
            }
            error.innerText = "";
            return true;
        }
        function validateAge() {
            const age = document.getElementById('age').value;
            const error = document.getElementById('ageError');
            if (age <= 18) {
                error.innerText = "Age must be greater than 18";
                return false;
            }
            error.innerText = "";
            return true;
        }
        function saveData() {
            const isNameValid = validateName();
            const isEmailValid = validateEmail();
            const isAgeValid = validateAge();
            if (isNameValid && isEmailValid && isAgeValid) {
                const userData = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    age: document.getElementById('age').value
                };
                sessionStorage.setItem('userData', JSON.stringify(userData));
                document.getElementById('finalMessage').innerHTML = 
                    "<p class='success'>Data saved successfully to sessionStorage!</p>";
            } else {
                document.getElementById('finalMessage').innerHTML = 
                    "<p class='error'>Please fix the errors before submitting.</p>";
            }
        }
    </script>
</body>
</html>
