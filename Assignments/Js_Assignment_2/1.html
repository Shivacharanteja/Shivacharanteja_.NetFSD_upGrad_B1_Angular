<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>
    <h1>Greeting Generator</h1>
    <input type="text" id="userName" placeholder="Enter name">
    <button onclick="handleAction()">Generate Greeting</button>
    <p id="greetingDisplay"></p>
    <script>
        function displayGreeting(name) {
            var welcomeMessage = "Hello, " + name + "! Welcome to our website.";
            document.getElementById("greetingDisplay").innerText = welcomeMessage;
        }
        function handleAction() {
            var userInput = document.getElementById("userName").value;
            displayGreeting(userInput);
        }
    </script>
</body>
</html>
